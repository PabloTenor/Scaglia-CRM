const {useState,useEffect,useRef} = React;

/* ── Constants ── */
const ETAPAS=['Frío','Potencial','Propuesta enviada','Seguimiento 1','Seguimiento 2','Seguimiento 3','Ganado','Perdido'];
const INSTRUMENTOS=['Alto','Tenor','Barítono','Soprano','Contralto','Otro'];
const PRODUCTOS=['Kaus','Pegasus','Tempra L','Tempra M','Flores','Floresta'];
const ORIGENES=['Instagram','WhatsApp','Referido','Feria','Endorser'];
const SERVICIOS=['Boquilla nueva','Refacing'];
const EC={
  'Frío':'bg-blue-900 text-blue-300','Potencial':'bg-violet-900 text-violet-300',
  'Propuesta enviada':'bg-yellow-900 text-yellow-300','Seguimiento 1':'bg-orange-900 text-orange-300',
  'Seguimiento 2':'bg-orange-900 text-orange-300','Seguimiento 3':'bg-red-900 text-red-300',
  'Ganado':'bg-green-900 text-green-300','Perdido':'bg-gray-700 text-gray-400',
};
const SK={LEADS:'sc-leads',SETTINGS:'sc-settings',HIST:id=>`sc-hist-${id}`};
const GKEY='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';

/* ── Storage ── */
const sg=(k,fb=null)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}};
const ss=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};

/* ── Utils ── */
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const tod=()=>new Date().toISOString().split('T')[0];
const isOver=d=>!!d&&d<tod();
const isToday=d=>!!d&&d===tod();
const fmt=d=>d?new Date(d+'T12:00:00').toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'}):'—';

/* ── WA parser ── */
function parseWA(text){
  const RE=/^(?:\[)?(\d{1,2}\/\d{1,2}\/\d{2,4})[,\s]\s*(\d{1,2}:\d{2}(?::\d{2})?(?:\s*[AP]M)?)(?:\])?[\s–\-]+(.+?):\s(.*)$/;
  const msgs=[];
  for(const l of text.split('\n')){const m=l.match(RE);if(m)msgs.push({date:m[1],time:m[2],who:m[3],text:m[4]});else if(msgs.length)msgs[msgs.length-1].text+='\n'+l;}
  return msgs;
}
function guessName(msgs){
  const s=[...new Set(msgs.map(m=>m.who))];
  return s.find(x=>!['Vos','Yo','Pablo','Pablo Scaglia','You','tú'].includes(x))||'';
}

/* ── Groq ── */
async function transcribeAudio(blob,fname,key){
  const ext=fname.split('.').pop().toLowerCase();
  const mime=ext==='mp3'?'audio/mpeg':ext==='m4a'?'audio/mp4':ext==='wav'?'audio/wav':'audio/ogg';
  const fd=new FormData();
  fd.append('file',new File([blob],fname,{type:mime}));
  fd.append('model','whisper-large-v3');fd.append('language','es');fd.append('response_format','text');
  const r=await fetch('https://api.groq.com/openai/v1/audio/transcriptions',{method:'POST',headers:{Authorization:`Bearer ${key}`},body:fd});
  if(!r.ok)throw new Error(`Groq ${r.status}`);
  return r.text();
}
async function qualify(content,key){
  const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{
    method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${key}`},
    body:JSON.stringify({model:'llama-3.3-70b-versatile',max_tokens:800,messages:[{role:'user',content:
`Sos el asistente de ventas de Scaglia Mouthpieces (Buenos Aires, boquillas HR saxofón, USD 400). Respondé conciso:

**1. Qué quiere** — instrumento, producto (Kaus/Pegasus/Tempra L/Tempra M/Flores/Floresta) o refacing (USD 100–150), presupuesto si se mencionó.
**2. Temperatura** — caliente / tibio / frío y por qué.
**3. Etapa sugerida** — una de: Frío, Potencial, Propuesta enviada, Seguimiento 1, Seguimiento 2, Seguimiento 3, Ganado, Perdido.
**4. Próximo paso** — qué hacer y cuándo.

Conversación:
${content.slice(0,4500)}`}]})
  });
  if(!r.ok)throw new Error(`Groq ${r.status}`);
  const d=await r.json();
  return d.choices?.[0]?.message?.content||'Sin respuesta.';
}

/* ── ZipImport ── */
function ZipImport({onImport,onName,groqKey}){
  const [st,setSt]=useState('idle'); // idle | loading | done | error
  const [msg,setMsg]=useState('');
  const handle=async e=>{
    const file=e.target.files?.[0];if(!file)return;e.target.value='';
    setSt('loading');setMsg('Abriendo ZIP…');
    try{
      const zip=await JSZip.loadAsync(file);const items=[];
      const tk=Object.keys(zip.files).find(k=>k.endsWith('.txt')&&!zip.files[k].dir);
      if(tk){setMsg('Procesando chat…');
        const content=await zip.files[tk].async('string');
        const msgs=parseWA(content);
        if(msgs.length>0){
          const name=guessName(msgs);if(name&&onName)onName(name);
          const prev=msgs.slice(0,60).map(m=>`[${m.date} ${m.time}] ${m.who}: ${m.text}`).join('\n');
          items.push({id:uid(),ts:new Date().toISOString(),tipo:'chat',text:`💬 ${msgs.length} mensajes de WhatsApp\n\n${prev}${msgs.length>60?`\n…(${msgs.length-60} más)`:''}`});
        }
      }
      const ak=Object.keys(zip.files).filter(k=>!zip.files[k].dir&&/\.(ogg|opus|mp3|m4a|wav)$/i.test(k));
      if(ak.length>0&&!groqKey){
        items.push({id:uid(),ts:new Date().toISOString(),tipo:'aviso',text:`🎙 ${ak.length} audio(s) encontrados. Configurá la key de Groq en ⚙ para transcribirlos.`});
      } else {
        for(let i=0;i<ak.length;i++){
          const k=ak[i];const fname=k.split('/').pop();
          setMsg(`Transcribiendo ${i+1}/${ak.length}: ${fname}`);
          try{const blob=await zip.files[k].async('blob');const t=await transcribeAudio(blob,fname,groqKey);
            items.push({id:uid(),ts:new Date().toISOString(),tipo:'audio',text:`🎙 ${fname}\n${t}`});
          }catch(err){items.push({id:uid(),ts:new Date().toISOString(),tipo:'error',text:`⚠ Error en ${fname}: ${err.message}`});}
        }
      }
      if(items.length){onImport(items);setSt('done');setMsg(`✓ ${items.length} elemento(s) importados`);}
      else{setSt('error');setMsg('No se encontró contenido en el ZIP.');}
    }catch(err){setSt('error');setMsg(`Error: ${err.message}`);}
  };
  if(st==='loading')return<div className="flex items-center gap-2 py-2"><div className="w-4 h-4 border-2 border-yellow-600 border-t-transparent rounded-full animate-spin shrink-0"/><span className="text-yellow-400 text-xs">{msg}</span></div>;
  if(st==='done')return<div className="flex items-center justify-between"><span className="text-green-400 text-xs">{msg}</span><div style={{position:'relative',overflow:'hidden',display:'inline-block',borderRadius:'6px'}}><span className="text-gray-500 text-xs underline px-2 py-1 block">Cambiar</span><input type="file" accept=".zip" onChange={handle} style={{position:'absolute',top:0,left:0,width:'100%',height:'100%',opacity:0,cursor:'pointer'}}/></div></div>;
  return(
    <div>
      {st==='error'&&<p className="text-red-400 text-xs mb-2">{msg}</p>}
      <div style={{position:'relative',overflow:'hidden',borderRadius:'12px'}}>
        <div className="w-full bg-gray-700 text-gray-300 py-3 rounded-xl flex items-center justify-center gap-2 text-sm pointer-events-none">📦 Seleccionar .zip de WhatsApp</div>
        <input type="file" accept=".zip,application/zip" onChange={handle} style={{position:'absolute',top:0,left:0,width:'100%',height:'100%',opacity:0,cursor:'pointer'}}/>
      </div>
    </div>
  );
}

/* ── PasteImport ── */
function PasteImport({onImport,onName,compact}){
  const [text,setText]=useState('');const [err,setErr]=useState('');const [done,setDone]=useState(false);
  const go=()=>{
    if(!text.trim())return;
    const msgs=parseWA(text.trim());
    if(!msgs.length){setErr('No se reconoció el formato. Exportá sin multimedia y pegá el .txt completo.');return;}
    const name=guessName(msgs);if(name&&onName)onName(name);
    const prev=msgs.slice(0,60).map(m=>`[${m.date} ${m.time}] ${m.who}: ${m.text}`).join('\n');
    onImport([{id:uid(),ts:new Date().toISOString(),tipo:'chat',text:`💬 ${msgs.length} mensajes de WhatsApp\n\n${prev}${msgs.length>60?`\n…(${msgs.length-60} más)`:''}`}]);
    setDone(true);setText('');
  };
  if(done)return<div className={`bg-gray-800 border border-green-900 rounded-xl p-3 flex items-center justify-between ${compact?'mb-3':''}`}><span className="text-green-400 text-xs">✓ Chat importado</span><button onClick={()=>setDone(false)} className="text-gray-500 text-xs underline">Pegar otro</button></div>;
  return(
    <div className={`bg-gray-800 border border-gray-700 rounded-xl p-4 space-y-3 ${compact?'mb-4':''}`}>
      <p className="text-gray-300 text-xs font-medium">💬 Pegar texto del chat</p>
      <p className="text-gray-500 text-xs leading-relaxed">WhatsApp → chat → ⋮ → Más → Exportar → Sin multimedia → abrí el .txt → copiá todo → pegá acá.</p>
      <textarea value={text} onChange={e=>setText(e.target.value)} placeholder="Pegá el chat acá…" rows={4}
        className="w-full bg-gray-900 border border-gray-700 rounded-xl px-3 py-2 text-white placeholder-gray-600 text-xs focus:outline-none resize-none"/>
      {err&&<p className="text-red-400 text-xs">{err}</p>}
      <button onClick={go} disabled={!text.trim()} className="w-full py-3 rounded-xl text-sm font-medium text-white" style={{background:text.trim()?'#d97706':'#374151'}}>Importar chat</button>
    </div>
  );
}

/* ── LeadForm ── */
function LeadForm({data,onChange}){
  const u=(k,v)=>onChange({...data,[k]:v});
  const sel=(k,lb,opts)=><div key={k}><label className="text-gray-500 text-xs block mb-1">{lb}</label><select value={data[k]||''} onChange={e=>u(k,e.target.value)} className="w-full bg-gray-800 border border-gray-700 rounded-xl px-3 py-2 text-white text-sm focus:outline-none"><option value="">— seleccionar —</option>{opts.map(o=><option key={o} value={o}>{o}</option>)}</select></div>;
  const inp=(k,lb,t)=><div key={k}><label className="text-gray-500 text-xs block mb-1">{lb}</label><input type={t||'text'} value={data[k]||''} onChange={e=>u(k,e.target.value)} className="w-full bg-gray-800 border border-gray-700 rounded-xl px-3 py-2 text-white text-sm focus:outline-none"/></div>;
  const ta=(k,lb)=><div key={k}><label className="text-gray-500 text-xs block mb-1">{lb}</label><textarea value={data[k]||''} onChange={e=>u(k,e.target.value)} rows={2} className="w-full bg-gray-800 border border-gray-700 rounded-xl px-3 py-2 text-white text-sm focus:outline-none resize-none"/></div>;
  return<div className="space-y-3">
    {inp('nombre','Nombre *')}{inp('telefono','Teléfono (5491112345678)')}
    {sel('instrumento','Instrumento',INSTRUMENTOS)}{sel('servicio','Servicio',SERVICIOS)}
    {sel('producto','Producto (si aplica)',['',...PRODUCTOS])}{sel('origen','Origen',ORIGENES)}
    {sel('tipo','Tipo',['B2C','B2B'])}{sel('etapa','Etapa',ETAPAS)}
    {inp('prox','Próximo contacto','date')}{ta('obs','Observaciones')}
  </div>;
}

  const [data,setData]=useState({id:uid(),nombre:'',telefono:'',instrumento:'',servicio:'',producto:'',origen:'',tipo:'B2C',etapa:'Frío',prox:'',obs:'',createdAt:new Date().toISOString()});
  const [ph,setPh]=useState([]);
  const save=()=>{if(!data.nombre){alert('Ingresá el nombre');return;}if(ph.length)ss(SK.HIST(data.id),ph);onSave(data);};
  return(
    <div className="fixed inset-0 z-50 flex items-end" style={{background:'rgba(0,0,0,0.85)'}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="bg-gray-900 w-full rounded-t-2xl p-4 max-w-2xl mx-auto overflow-y-auto" style={{maxHeight:'92vh'}}>

/* ── Dashboard ── */
function Dashboard({leads,urgentes,onSelect,onUpdate}){
  const activos=leads.filter(l=>l.etapa!=='Ganado'&&l.etapa!=='Perdido').length;
  const ganados=leads.filter(l=>l.etapa==='Ganado').length;
  const bump=(l,d)=>{const b=new Date((l.prox||tod())+'T12:00:00');b.setDate(b.getDate()+d);onUpdate({...l,prox:b.toISOString().split('T')[0]});};
  return(
    <div className="space-y-5 mt-2">
      <div className="grid grid-cols-3 gap-3">
        {[{v:activos,l:'Activos',c:'#d97706'},{v:urgentes.length,l:'Urgentes',c:urgentes.length?'#f87171':'#34d399'},{v:ganados,l:'Ganados',c:'#34d399'}].map(({v,l,c})=>(
          <div key={l} className="bg-gray-800 border border-gray-700 rounded-xl p-3 text-center"><div className="text-3xl font-bold" style={{color:c}}>{v}</div><div className="text-gray-500 text-xs mt-1">{l}</div></div>
        ))}
      </div>
      <div>
        <h2 className="text-white font-semibold mb-3">⚠️ Seguimientos pendientes</h2>
        {urgentes.length===0?(
          <div className="bg-gray-800 border border-gray-700 rounded-xl p-8 text-center"><div className="text-4xl mb-2">✓</div><p className="text-gray-400">Estás al día</p></div>
        ):urgentes.map(l=>(
          <div key={l.id} className="bg-gray-800 border rounded-xl p-3 mb-2" style={{borderColor:isOver(l.prox)?'#7f1d1d':'#78350f'}}>
            <div className="flex items-start gap-2">
              <button onClick={()=>onSelect(l.id)} className="flex-1 text-left">
                <div className="flex items-center gap-1.5 mb-1">
                  <span className="text-xs px-2 py-0.5 rounded-full" style={{background:isOver(l.prox)?'#450a0a':'#431407',color:isOver(l.prox)?'#fca5a5':'#fdba74'}}>{isOver(l.prox)?'⚠ Vencido':'⏰ Hoy'}</span>
                  <span className="text-gray-500 text-xs">{l.etapa}</span>
                </div>
                <div className="text-white font-medium">{l.nombre}</div>
                <div className="text-gray-400 text-xs">{[l.instrumento,l.servicio,l.producto].filter(Boolean).join(' · ')}</div>
                <div className="text-gray-500 text-xs">{fmt(l.prox)}</div>
              </button>
              <div className="flex flex-col gap-1 shrink-0">
                <button onClick={()=>bump(l,7)} className="text-xs bg-gray-700 text-gray-300 px-2 py-1 rounded-lg">+7d</button>
                <button onClick={()=>bump(l,14)} className="text-xs bg-gray-700 text-gray-300 px-2 py-1 rounded-lg">+14d</button>
              </div>
            </div>
          </div>
        ))}
      </div>
      <div>
        <h2 className="text-white font-semibold mb-3">Pipeline</h2>
        {ETAPAS.filter(e=>e!=='Ganado'&&e!=='Perdido').map(e=>{const n=leads.filter(l=>l.etapa===e).length;return(
          <div key={e} className="flex justify-between bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 mb-1">
            <span className="text-gray-300">{e}</span><span style={{color:n?'#d97706':'#4b5563',fontWeight:n?600:400}}>{n}</span>
          </div>
        );})}
      </div>
    </div>
  );
}

/* ── LeadsTable ── */
function LeadsTable({leads,filters,setFilters,onSelect,onDelete}){
  const set=(k,v)=>setFilters(f=>({...f,[k]:v}));
  const fl=leads.filter(l=>{
    if(filters.etapa&&l.etapa!==filters.etapa)return false;
    if(filters.servicio&&l.servicio!==filters.servicio)return false;
    if(filters.origen&&l.origen!==filters.origen)return false;
    if(filters.q){const q=filters.q.toLowerCase();if(!l.nombre?.toLowerCase().includes(q)&&!l.telefono?.includes(q))return false;}
    return true;
  });
  return(
    <div className="space-y-3 mt-2">
      <input type="text" value={filters.q} onChange={e=>set('q',e.target.value)} placeholder="Buscar nombre o teléfono…" className="w-full bg-gray-800 border border-gray-700 rounded-xl px-3 py-2.5 text-white placeholder-gray-600 focus:outline-none text-sm"/>
      <div className="grid grid-cols-3 gap-2">
        {[{k:'etapa',opts:ETAPAS,ph:'Etapa'},{k:'servicio',opts:SERVICIOS,ph:'Servicio'},{k:'origen',opts:ORIGENES,ph:'Origen'}].map(({k,opts,ph})=>(
          <select key={k} value={filters[k]} onChange={e=>set(k,e.target.value)} className="bg-gray-800 border border-gray-700 rounded-xl px-2 py-2 text-gray-300 focus:outline-none text-xs">
            <option value="">{ph}</option>{opts.map(o=><option key={o} value={o}>{o}</option>)}
          </select>
        ))}
      </div>
      <p className="text-gray-500 text-xs">{fl.length} lead{fl.length!==1?'s':''}</p>
      {fl.length===0?<div className="bg-gray-800 border border-gray-700 rounded-xl p-8 text-center text-gray-500">Sin resultados</div>:fl.map(l=>(
        <div key={l.id} className="bg-gray-800 border border-gray-700 rounded-xl p-3">
          <div className="flex items-start gap-2">
            <button onClick={()=>onSelect(l.id)} className="flex-1 text-left">
              <div className="flex items-center gap-1.5 flex-wrap mb-1">
                <span className={`text-xs px-2 py-0.5 rounded-full ${EC[l.etapa]||'bg-gray-700 text-gray-400'}`}>{l.etapa}</span>
                {isOver(l.prox)&&<span className="text-xs text-red-400">⚠ Vencido</span>}
                {isToday(l.prox)&&<span className="text-xs text-yellow-400">⏰ Hoy</span>}
              </div>
              <div className="text-white font-medium">{l.nombre}</div>
              <div className="text-gray-400 text-xs">{[l.instrumento,l.servicio,l.producto].filter(Boolean).join(' · ')}</div>
              <div className="text-gray-500 text-xs">{[l.origen,l.tipo,l.prox?fmt(l.prox):null].filter(Boolean).join(' · ')}</div>
            </button>
            <button onClick={()=>{if(confirm(`Eliminar ${l.nombre}?`))onDelete(l.id)}} className="text-gray-600 text-lg p-1">🗑</button>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ── LeadDetail ── */
function LeadDetail({lead,settings,onUpdate,onDelete}){
  const [hist,setHist]=useState(()=>sg(SK.HIST(lead.id),[]));
  const [note,setNote]=useState('');
  const [tab,setTab]=useState('hist');
  const [editing,setEditing]=useState(false);
  const [editData,setEditData]=useState({...lead});
  const [qualifying,setQualifying]=useState(false);
  const [qual,setQual]=useState('');

  useEffect(()=>{setHist(sg(SK.HIST(lead.id),[]));setEditData({...lead});},[lead.id]);

  const push=items=>{const next=[...items,...hist];setHist(next);ss(SK.HIST(lead.id),next);};
  const addNote=()=>{if(!note.trim())return;push([{id:uid(),ts:new Date().toISOString(),tipo:'nota',text:note.trim()}]);setNote('');};

  const doQualify=async()=>{
    if(!settings?.groqKey){setQual('Configurá la API key de Groq en ⚙ primero.');return;}
    const src=hist.filter(h=>h.tipo==='chat'||h.tipo==='audio').map(h=>h.text).join('\n\n---\n\n');
    if(!src){setQual('Importá el chat de WhatsApp primero (tab Importar).');return;}
    setQualifying(true);setQual('');
    try{setQual(await qualify(src,settings.groqKey));}catch(err){setQual(`Error: ${err.message}`);}
    setQualifying(false);
  };

  const IC={nota:'📝',chat:'💬',audio:'🎙',error:'⚠️',aviso:'ℹ️'};

  return(
    <div className="space-y-4 mt-2">
      {/* Card */}
      <div className="bg-gray-800 border border-gray-700 rounded-xl p-4">
        <div className="flex justify-between items-start">
          <div className="flex-1 min-w-0">
            <h2 className="text-white text-lg font-bold truncate">{lead.nombre||'Sin nombre'}</h2>
            {lead.telefono&&<a href={`https://wa.me/${lead.telefono.replace(/\D/g,'')}`} target="_blank" className="text-green-400 text-xs mt-1 block">📞 {lead.telefono}</a>}
          </div>
          <div className="flex gap-1">
            <button onClick={()=>setEditing(true)} className="text-gray-500 p-1 text-lg">✏️</button>
            <button onClick={()=>{if(confirm(`Eliminar ${lead.nombre}?`))onDelete(lead.id)}} className="text-gray-500 p-1 text-lg">🗑</button>
          </div>
        </div>
        <div className="flex flex-wrap gap-1.5 mt-3">
          <span className={`text-xs px-2 py-0.5 rounded-full ${EC[lead.etapa]||'bg-gray-700 text-gray-400'}`}>{lead.etapa}</span>
          {[lead.instrumento,lead.servicio,lead.origen,lead.tipo].filter(Boolean).map(t=><span key={t} className="text-xs px-2 py-0.5 rounded-full bg-gray-700 text-gray-300">{t}</span>)}
        </div>
        {lead.producto&&<div className="text-xs mt-2" style={{color:'#d97706'}}>📦 {lead.producto}</div>}
        {lead.prox&&<div className={`flex items-center gap-1 mt-2 text-xs ${isOver(lead.prox)?'text-red-400':isToday(lead.prox)?'text-yellow-400':'text-gray-400'}`}>📅 Próximo: {fmt(lead.prox)}{isOver(lead.prox)&&' ⚠ Vencido'}{isToday(lead.prox)&&' — Hoy'}</div>}
        {lead.obs&&<div className="mt-2 text-gray-400 text-xs bg-gray-900 rounded-lg p-2">{lead.obs}</div>}
      </div>

      {/* Quick edits */}
      <div className="grid grid-cols-2 gap-2">
        <div><label className="text-gray-500 text-xs block mb-1">Etapa</label>
          <select value={lead.etapa} onChange={e=>onUpdate({...lead,etapa:e.target.value})} className="w-full bg-gray-800 border border-gray-700 rounded-xl px-2 py-2 text-xs text-white focus:outline-none">
            {ETAPAS.map(e=><option key={e} value={e}>{e}</option>)}
          </select>
        </div>
        <div><label className="text-gray-500 text-xs block mb-1">Próximo contacto</label>
          <input type="date" value={lead.prox||''} onChange={e=>onUpdate({...lead,prox:e.target.value})} className="w-full bg-gray-800 border border-gray-700 rounded-xl px-2 py-2 text-xs text-white focus:outline-none"/>
        </div>
      </div>

      {/* Tabs */}
      <div className="flex bg-gray-800 rounded-xl p-1 gap-1">
        {[{id:'hist',l:'Historial'},{id:'import',l:'Importar'},{id:'califica',l:'Calificar'}].map(({id,l})=>(
          <button key={id} onClick={()=>setTab(id)} className="flex-1 py-2 rounded-lg text-xs transition-colors" style={{background:tab===id?'#374151':'transparent',color:tab===id?'white':'#6b7280'}}>{l}</button>
        ))}
      </div>

      {tab==='hist'&&(
        <div className="space-y-3">
          <div className="flex gap-2">
            <input value={note} onChange={e=>setNote(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addNote()} placeholder="Nota rápida (Enter = guardar)" className="flex-1 bg-gray-800 border border-gray-700 rounded-xl px-3 py-2 text-white placeholder-gray-600 text-sm focus:outline-none"/>
            <button onClick={addNote} className="text-white px-3 rounded-xl text-lg" style={{background:'#d97706'}}>+</button>
          </div>
          {hist.length===0?<p className="text-gray-500 text-sm text-center py-8">Sin historial</p>:hist.map(h=>(
            <div key={h.id} className="bg-gray-800 border border-gray-700 rounded-xl p-3">
              <div className="flex items-center gap-2 mb-1"><span>{IC[h.tipo]||'📌'}</span><span className="text-gray-500 text-xs">{new Date(h.ts).toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</span></div>
              <div className="text-gray-300 text-xs whitespace-pre-wrap leading-relaxed">{h.text}</div>
            </div>
          ))}
        </div>
      )}

      {tab==='import'&&(
        <div className="space-y-3">
          <PasteImport onImport={items=>{push(items);setTab('hist');}} onName={n=>{if(!lead.nombre)onUpdate({...lead,nombre:n});}}/>
          <details className="bg-gray-800 border border-gray-700 rounded-xl overflow-hidden">
            <summary className="px-4 py-3 text-gray-400 text-xs cursor-pointer">📦 Subir .zip (funciona en PC y navegador del celular)</summary>
            <div className="px-4 pb-4 pt-3 border-t border-gray-700">
              <ZipImport onImport={items=>{push(items);setTab('hist');}} onName={n=>{if(!lead.nombre)onUpdate({...lead,nombre:n});}} groqKey={settings?.groqKey}/>
            </div>
          </details>
        </div>
      )}

      {tab==='califica'&&(
        <div className="space-y-3">
          <div className="bg-gray-800 border border-gray-700 rounded-xl p-4">
            <p className="text-gray-300 font-medium mb-1">🤖 Análisis IA del lead</p>
            <p className="text-gray-500 text-xs mb-3">Analiza el chat importado con Llama (Groq). Necesitás la key configurada.</p>
            <button onClick={doQualify} disabled={qualifying} className="w-full text-white py-3 rounded-xl text-sm font-medium" style={{background:qualifying?'#374151':'#d97706',color:qualifying?'#6b7280':'white'}}>
              {qualifying?'Analizando…':'Calificar lead'}
            </button>
          </div>
          {qual&&<div className="bg-gray-800 border rounded-xl p-4 text-gray-200 text-xs whitespace-pre-wrap leading-relaxed" style={{borderColor:'#92400e'}}>{qual}</div>}
        </div>
      )}

      {editing&&(
        <div className="fixed inset-0 z-50 flex items-end" style={{background:'rgba(0,0,0,0.85)'}} onClick={e=>e.target===e.currentTarget&&setEditing(false)}>
          <div className="bg-gray-900 w-full rounded-t-2xl p-4 max-w-2xl mx-auto overflow-y-auto" style={{maxHeight:'92vh'}}>
            <div className="flex justify-between items-center mb-4"><h3 className="text-white font-bold">Editar lead</h3><button onClick={()=>setEditing(false)} className="text-gray-500 text-xl">✕</button></div>
            <LeadForm data={editData} onChange={setEditData}/>
            <div className="flex gap-2 mt-4 pb-4">
              <button onClick={()=>setEditing(false)} className="flex-1 bg-gray-700 text-white py-3 rounded-xl">Cancelar</button>
              <button onClick={()=>{onUpdate({...lead,...editData});setEditing(false);}} className="flex-1 text-white py-3 rounded-xl" style={{background:'#d97706'}}>Guardar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── App ── */
function App(){
  const [view,setView]=useState('dashboard');
  const [leads,setLeads]=useState(()=>sg(SK.LEADS,[]));
  const [selId,setSelId]=useState(null);
  const [settings,setSettings]=useState(()=>{
    const s=sg(SK.SETTINGS,null);
    if(!s){const d={groqKey:GKEY};ss(SK.SETTINGS,d);return d;}
    return s;
  });
  const [modal,setModal]=useState(null);
  const [filters,setFilters]=useState({q:'',etapa:'',servicio:'',origen:''});

  const upsert=lead=>setLeads(prev=>{const idx=prev.findIndex(l=>l.id===lead.id);const next=idx>=0?prev.map((l,i)=>i===idx?lead:l):[...prev,lead];ss(SK.LEADS,next);return next;});
  const remove=id=>setLeads(prev=>{const next=prev.filter(l=>l.id!==id);ss(SK.LEADS,next);return next;});

  const urgentes=leads.filter(l=>l.etapa!=='Ganado'&&l.etapa!=='Perdido'&&(isOver(l.prox)||isToday(l.prox)));
  const selLead=leads.find(l=>l.id===selId);

  return(
    <div style={{minHeight:'100vh',background:'#111827',color:'#f3f4f6',fontSize:'14px'}}>
      {/* Header */}
      <header className="sticky top-0 z-20 border-b border-gray-800 px-4 py-3" style={{background:'#0d0d0d'}}>
        <div className="flex items-center justify-between max-w-2xl mx-auto">
          <div className="flex items-center gap-3">
            {(view==='leads'||view==='detail')&&<button onClick={()=>setView(view==='detail'?'leads':'dashboard')} className="text-gray-400 text-2xl leading-none">‹</button>}
            <div><div className="font-bold tracking-widest text-base leading-none" style={{color:'#d97706'}}>SCAGLIA</div><div className="text-gray-600 text-xs">CRM · Boquillas</div></div>
          </div>
          <div className="flex items-center gap-3">
            {urgentes.length>0&&<button onClick={()=>setView('dashboard')} className="relative"><span className="text-red-400 text-lg">🔔</span><span className="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full w-4 h-4 flex items-center justify-center leading-none">{urgentes.length}</span></button>}
            <button onClick={()=>setModal('settings')} className="text-gray-500 text-lg">⚙️</button>
          </div>
        </div>
      </header>

      {/* Nav */}
      <nav className="border-b border-gray-800 px-4" style={{background:'#111827'}}>
        <div className="flex max-w-2xl mx-auto">
          {[{id:'dashboard',l:'Inicio'},{id:'leads',l:`Leads (${leads.length})`}].map(({id,l})=>(
            <button key={id} onClick={()=>setView(id)} className="px-4 py-3 border-b-2 text-sm transition-colors"
              style={{borderColor:(view===id||(view==='detail'&&id==='leads'))?'#d97706':'transparent',color:(view===id||(view==='detail'&&id==='leads'))?'#d97706':'#6b7280'}}>
              {l}
            </button>
          ))}
        </div>
      </nav>

      {/* Content */}
      <main className="max-w-2xl mx-auto p-4 pb-24">
        {view==='dashboard'&&<Dashboard leads={leads} urgentes={urgentes} onSelect={id=>{setSelId(id);setView('detail');}} onUpdate={upsert}/>}
        {view==='leads'&&<LeadsTable leads={leads} filters={filters} setFilters={setFilters} onSelect={id=>{setSelId(id);setView('detail');}} onDelete={remove}/>}
        {view==='detail'&&selLead&&<LeadDetail lead={selLead} settings={settings} onUpdate={upsert} onDelete={id=>{remove(id);setView('leads');}}/>}
      </main>

      {/* FAB */}
      {view!=='detail'&&<button onClick={()=>setModal('add')} className="fixed bottom-6 right-6 text-white rounded-full w-14 h-14 flex items-center justify-center shadow-2xl z-10 text-2xl" style={{background:'#d97706'}}>+</button>}

      {modal==='add'&&<LeadModal settings={settings} onSave={l=>{upsert(l);setModal(null);}} onClose={()=>setModal(null)}/>}
      {modal==='settings'&&<SettingsModal settings={settings} onSave={s=>{ss(SK.SETTINGS,s);setSettings(s);setModal(null);}} onClose={()=>setModal(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
