<style>
:root{
  --bg:#0f0f0f;--surf:#171717;--surf2:#1f1f1f;
  --bdr:#272727;--bdr2:#353535;
  --gold:#c49a2a;--gold-dim:#8a6b1a;--gold-glow:rgba(196,154,42,0.35);
  --t1:#ede9e0;--t2:#9a9088;--t3:#5a5550;
  --me-bg:#1a3a2a;--me-border:#2d6a4f;--me-text:#a8d8c0;
  --them-bg:#1f1f1f;--them-border:#2a2a2a;--them-text:#c8c0b8;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{background:var(--bg);color:var(--t1);font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}
details>summary{list-style:none}details>summary::-webkit-details-marker{display:none}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.6)}
a{text-decoration:none}
input,select,textarea{background:var(--surf2);border:1px solid var(--bdr);border-radius:10px;color:var(--t1);font-family:'Inter',system-ui,sans-serif;font-size:13px;padding:10px 13px;width:100%;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
input::placeholder,textarea::placeholder{color:var(--t3)}
select option{background:var(--surf2)}
button{font-family:'Inter',system-ui,sans-serif;cursor:pointer;border:none;outline:none;background:none}
.btn-p{background:var(--gold);color:#0f0f0f;font-weight:700;border-radius:10px;padding:13px;font-size:14px;width:100%;transition:opacity .15s;letter-spacing:.01em}
.btn-p:active{opacity:.8}
.btn-s{background:var(--surf2);color:var(--t2);border:1px solid var(--bdr);border-radius:10px;padding:13px;font-size:14px;width:100%}
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:14px;padding:16px}
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;letter-spacing:.03em}
.lbl{display:block;font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:50;display:flex;align-items:flex-end;backdrop-filter:blur(3px)}
.sheet{background:var(--surf);border-radius:20px 20px 0 0;padding:8px 16px 20px;width:100%;max-width:640px;margin:0 auto;max-height:92vh;overflow-y:auto}
.handle{width:36px;height:4px;background:var(--bdr2);border-radius:2px;margin:0 auto 18px}
.tabs{display:flex;background:var(--surf2);border-radius:12px;padding:4px;gap:3px}
.tab{flex:1;padding:8px 4px;border-radius:8px;font-size:12px;font-weight:500;background:transparent;color:var(--t3);transition:all .15s}
.tab.on{background:var(--surf);color:var(--t1);box-shadow:0 1px 3px rgba(0,0,0,.4)}
.stitle{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .8s linear infinite}

<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

/* ── Constants ── */
const ETAPAS=['Frío','Potencial','Propuesta enviada','Seguimiento 1','Seguimiento 2','Seguimiento 3','Ganado','Perdido'];
const INSTRUMENTOS=['Alto','Tenor','Barítono','Soprano','Contralto','Otro'];
const PRODUCTOS=['Kaus','Pegasus','Tempra L','Tempra M','Flores','Floresta'];
const ORIGENES=['Instagram','WhatsApp','Referido','Feria','Endorser'];
const SERVICIOS=['Boquilla nueva','Refacing'];
const PABLO_NAMES=['Vos','Yo','Pablo','Pablo Scaglia','You','tú'];
const BADGE_STYLE={
  'Frío':{bg:'#162140',c:'#90cdf4'},'Potencial':{bg:'#241854',c:'#c4b5fd'},
  'Propuesta enviada':{bg:'#3a2500',c:'#f6c860'},'Seguimiento 1':{bg:'#3a1800',c:'#fbd38d'},
  'Seguimiento 2':{bg:'#3a1800',c:'#fbd38d'},'Seguimiento 3':{bg:'#3a0a0a',c:'#fc8181'},
  'Ganado':{bg:'#0f2d1e',c:'#68d391'},'Perdido':{bg:'#1a1a1a',c:'#5a5550'},
};
const SK={LEADS:'sc-leads',SETTINGS:'sc-settings',HIST:id=>`sc-hist-${id}`};
const GKEY='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';

/* ── Storage ── */
const sg=(k,fb=null)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}};
const ss=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};

/* ── Utils ── */
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const tod=()=>new Date().toISOString().split('T')[0];
const isOver=d=>!!d&&d<tod();
const isToday=d=>!!d&&d===tod();
const fmt=d=>d?new Date(d+'T12:00:00').toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'}):'—';

function toISO(dateStr){
  const p=dateStr.split('/');
  if(p.length!==3)return null;
  const y=p[2].length===2?'20'+p[2]:p[2];
  return `${y}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
}
function parseChatDates(msgs){
  if(!msgs.length)return{};
  const dates=msgs.map(m=>toISO(m.date)).filter(Boolean).sort();
  return{primerContacto:dates[0]||null,ultimoContacto:dates[dates.length-1]||null};
}

/* ── WA parser ── */
function parseWA(text){
  const RE=/^(?:\[)?(\d{1,2}\/\d{1,2}\/\d{2,4})[,\s]\s*(\d{1,2}:\d{2}(?::\d{2})?(?:\s*[AP]M)?)(?:\])?[\s–\-]+(.+?):\s(.*)$/;
  const msgs=[];
  for(const l of text.split('\n')){const m=l.match(RE);if(m)msgs.push({date:m[1],time:m[2],who:m[3],text:m[4]});else if(msgs.length)msgs[msgs.length-1].text+='\n'+l;}
  return msgs;
}
function guessName(msgs){
  const s=[...new Set(msgs.map(m=>m.who))];
  return s.find(x=>!PABLO_NAMES.includes(x))||'';
}

/* ── Notifications ── */
function requestNotifs(){
  if('Notification'in window&&Notification.permission==='default'){
    Notification.requestPermission();
  }
}
function notify(title,body){
  if('Notification'in window&&Notification.permission==='granted'){
    new Notification(title,{body,icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><circle cx="16" cy="16" r="16" fill="%23c49a2a"/></svg>'});
  }
}

/* ── Groq ── */
async function transcribeAudio(blob,fname,key){
  const ext=fname.split('.').pop().toLowerCase();
  const mime=ext==='mp3'?'audio/mpeg':ext==='m4a'?'audio/mp4':ext==='wav'?'audio/wav':'audio/ogg';
  const fd=new FormData();
  fd.append('file',new File([blob],fname,{type:mime}));
  fd.append('model','whisper-large-v3');fd.append('language','es');fd.append('response_format','text');
  const r=await fetch('https://api.groq.com/openai/v1/audio/transcriptions',{method:'POST',headers:{Authorization:`Bearer ${key}`},body:fd});
  if(!r.ok)throw new Error(`Groq ${r.status}`);return r.text();
}

async function extractInfo(src,key){
  const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{
    method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${key}`},
    body:JSON.stringify({model:'llama-3.1-8b-instant',max_tokens:200,messages:[{role:'user',content:
`Analizá esta conversación y extraé los datos. Respondé SOLO con JSON válido sin backticks:
{"nombre":"nombre del contacto o null","instrumento":"Alto|Tenor|Barítono|Soprano|Contralto|Otro o null","servicio":"Boquilla nueva|Refacing o null","boquilla_actual":"marca modelo o null","apertura":"número o null"}
Conversación:
${src.slice(0,2500)}`}]})
  });
  if(!r.ok)return{};
  const d=await r.json();
  try{return JSON.parse((d.choices?.[0]?.message?.content||'{}').replace(/```json|```/g,'').trim());}catch{return{};}
}

async function qualify(src,key){
  const today=new Date();
  const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{
    method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${key}`},
    body:JSON.stringify({model:'llama-3.3-70b-versatile',max_tokens:900,messages:[{role:'user',content:
`Sos el asistente de ventas de Scaglia Mouthpieces (Buenos Aires). Hoy es ${tod()}. Analizá esta conversación:

**1. Qué quiere**
Instrumento, producto o refacing, apertura, boquilla actual, presupuesto si se mencionó.

**2. Temperatura**
Caliente / Tibio / Frío — por qué en una línea.

**3. Etapa sugerida**
Elegí UNA: Frío | Potencial | Propuesta enviada | Seguimiento 1 | Seguimiento 2 | Seguimiento 3 | Ganado | Perdido

**4. Próximo paso**
Acción concreta en una línea.

**5. Mensaje sugerido**
Texto exacto de WhatsApp a mandar, tono natural y argentino, máximo 3 líneas, entre comillas.

**6. Fecha próximo contacto**
Formato YYYY-MM-DD. Basate en la etapa: Frío=30 días, Potencial=14, Propuesta enviada=7, Seguimiento 1=7, Seguimiento 2=14, Seguimiento 3=30.

Productos: Kaus, Pegasus (PULSE) · Tempra L, Tempra M, Flores, Floresta (AURA). Boquilla HR: USD 400. Refacing: USD 100–150.

Conversación:
${src.slice(0,4500)}`}]})
  });
  if(!r.ok)throw new Error(`Groq ${r.status}`);
  const d=await r.json();return d.choices?.[0]?.message?.content||'Sin respuesta.';
}

function parseProxDate(result){
  const lines=result.split('\n');
  const i6=lines.findIndex(l=>/6\./i.test(l));
  const chunk=i6>=0?lines.slice(i6,i6+3).join(' '):result;
  const m=chunk.match(/(\d{4}-\d{2}-\d{2})/);
  return m?m[1]:null;
}

/* ── Google Drive ── */
async function listDriveZips(token){
  const q=encodeURIComponent("name contains '.zip' and trashed=false");
  const fields=encodeURIComponent("files(id,name,modifiedTime)");
  const r=await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=${fields}&orderBy=modifiedTime+desc&pageSize=50`,
    {headers:{Authorization:`Bearer ${token}`}});
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  return d.files||[];
}
async function downloadDriveFile(fileId,token){
  const r=await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
    {headers:{Authorization:`Bearer ${token}`}});
  if(!r.ok)throw new Error(`Drive ${r.status}`);
  return r.blob();
}

function DriveImport({settings,onImport,onName,groqKey}){
  const [st,setSt]=useState('idle'); // idle | connecting | files | loading | done | err
  const [files,setFiles]=useState([]);
  const [token,setToken]=useState(null);
  const [msg,setMsg]=useState('');

  const connect=()=>{
    if(!settings?.googleClientId){alert('Configurá el Google Client ID en Ajustes (⚙) primero.');return;}
    if(!window.google){alert('Google aún se está cargando. Esperá un segundo e intentá de nuevo.');return;}
    setSt('connecting');
    const tc=window.google.accounts.oauth2.initTokenClient({
      client_id:settings.googleClientId,
      scope:'https://www.googleapis.com/auth/drive.readonly',
      callback:async resp=>{
        if(resp.error){setSt('err');setMsg(resp.error);return;}
        setToken(resp.access_token);
        setSt('loading');setMsg('Buscando ZIPs en Drive…');
        try{
          const zips=await listDriveZips(resp.access_token);
          setFiles(zips);setSt('files');
        }catch(e){setSt('err');setMsg(e.message);}
      },
    });
    tc.requestAccessToken({prompt:''});
  };

  const pick=async file=>{
    setSt('loading');setMsg(`Descargando ${file.name}…`);
    try{
      const blob=await downloadDriveFile(file.id,token);
      const zip=await JSZip.loadAsync(blob);const items=[];
      const tk=Object.keys(zip.files).find(k=>k.endsWith('.txt')&&!zip.files[k].dir);
      if(tk){setMsg('Procesando chat…');
        const content=await zip.files[tk].async('string');
        const msgs=parseWA(content);
        if(msgs.length>0){
          const name=guessName(msgs);if(name&&onName)onName(name);
          const dates=parseChatDates(msgs);
          items.push({id:uid(),ts:new Date().toISOString(),tipo:'chat',text:`💬 ${msgs.length} mensajes`,mensajes:msgs,...dates});
        }
      }
      const ak=Object.keys(zip.files).filter(k=>!zip.files[k].dir&&/\.(ogg|opus|mp3|m4a|wav)$/i.test(k));
      if(ak.length>0&&!groqKey){items.push({id:uid(),ts:new Date().toISOString(),tipo:'aviso',text:`🎙 ${ak.length} audio(s). Configurá Groq en ⚙.`});}
      else{for(let i=0;i<ak.length;i++){
        const k=ak[i];const fname=k.split('/').pop();
        setMsg(`Transcribiendo ${i+1}/${ak.length}…`);
        try{const b=await zip.files[k].async('blob');const t=await transcribeAudio(b,fname,groqKey);
          items.push({id:uid(),ts:new Date().toISOString(),tipo:'audio',text:`🎙 ${fname}\n${t}`});
        }catch(e){items.push({id:uid(),ts:new Date().toISOString(),tipo:'error',text:`⚠ ${fname}: ${e.message}`});}
      }}
      if(items.length){onImport(items);setSt('done');setMsg(`✓ "${file.name}" importado`);}
      else{setSt('files');setMsg('No se encontró contenido.');}
    }catch(e){setSt('err');setMsg(e.message);}
  };

  if(st==='idle')return(
    <div style={{position:'relative',overflow:'hidden',borderRadius:10,marginBottom:12}}>
      <div style={{padding:'12px 14px',background:'var(--surf2)',border:'1px solid var(--bdr)',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',gap:8,fontSize:13,color:'var(--t2)',pointerEvents:'none'}}>
        📂 Seleccionar desde Google Drive
      </div>
      <button onClick={connect} style={{position:'absolute',inset:0,width:'100%',height:'100%',opacity:0,cursor:'pointer'}}/>
    </div>
  );
  if(st==='connecting'||st==='loading')return(
    <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',marginBottom:12}}>
      <Spin/><span style={{color:'var(--gold)',fontSize:12}}>{msg||'Conectando con Google…'}</span>
    </div>
  );
  if(st==='done')return(
    <div style={{padding:'10px 14px',background:'#0f2d1e',border:'1px solid #2d6a4f',borderRadius:10,marginBottom:12,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <span style={{color:'#68d391',fontSize:12}}>{msg}</span>
      <button onClick={()=>setSt('files')} style={{color:'var(--t3)',fontSize:12,textDecoration:'underline'}}>Otro archivo</button>
    </div>
  );
  if(st==='err')return(
    <div style={{marginBottom:12}}>
      <p style={{color:'#fc8181',fontSize:12,marginBottom:8}}>⚠ Error: {msg}</p>
      <button onClick={()=>setSt('idle')} style={{fontSize:12,color:'var(--t3)',textDecoration:'underline'}}>Reintentar</button>
    </div>
  );
  // files
  return(
    <div style={{marginBottom:12}}>
      <p style={{fontSize:11,color:'var(--t3)',marginBottom:8,fontWeight:600,textTransform:'uppercase',letterSpacing:'.08em'}}>
        ZIPs en tu Drive ({files.length})
      </p>
      {files.length===0&&<p style={{fontSize:12,color:'var(--t3)'}}>No se encontraron archivos .zip en Drive.</p>}
      <div style={{display:'flex',flexDirection:'column',gap:6,maxHeight:200,overflowY:'auto'}}>
        {files.map(f=>(
          <button key={f.id} onClick={()=>pick(f)} style={{
            padding:'10px 14px',background:'var(--surf2)',border:'1px solid var(--bdr)',borderRadius:10,
            textAlign:'left',fontSize:12,color:'var(--t2)',display:'flex',justifyContent:'space-between',alignItems:'center'
          }}>
            <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}}>📦 {f.name}</span>
            <span style={{fontSize:10,color:'var(--t3)',marginLeft:8,flexShrink:0}}>
              {new Date(f.modifiedTime).toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'})}
            </span>
          </button>
        ))}
      </div>
      <button onClick={()=>setSt('idle')} style={{fontSize:11,color:'var(--t3)',textDecoration:'underline',marginTop:8}}>Cancelar</button>
    </div>
  );
}

/* ── Extraer texto real del historial para la IA ── */
function buildSrc(hist){
  return hist
    .filter(h=>h.tipo==='chat'||h.tipo==='audio')
    .map(h=>{
      if(h.tipo==='chat'){
        // Formato nuevo: mensajes parseados
        if(h.mensajes?.length){
          return h.mensajes.map(m=>`[${m.date} ${m.time}] ${m.who}: ${m.text}`).join('\n');
        }
        // Formato viejo: el texto contiene el preview del chat (hasta 60 msgs)
        return h.text||'';
      }
      return h.text||'';
    })
    .filter(s=>s&&s.length>10)
    .join('\n\n---\n\n');
}

/* ── runQualifyForLead ── (refresh all + calificar individual) */
async function runQualifyForLead(lead,key){
  const hist=sg(SK.HIST(lead.id),[]);
  const src=buildSrc(hist);
  if(!src.trim())return null;
  const [info,result]=await Promise.all([extractInfo(src,key),qualify(src,key)]);
  const updates={ultimoContacto:tod()};
  if(info.nombre)updates.nombre=info.nombre;
  if(info.instrumento)updates.instrumento=info.instrumento;
  if(info.servicio)updates.servicio=info.servicio;
  const found=ETAPAS.find(e=>result.includes(e));
  if(found)updates.etapa=found;
  const proxDate=parseProxDate(result);
  if(proxDate)updates.prox=proxDate;
  const analisisItem={id:uid(),ts:new Date().toISOString(),tipo:'analisis',text:result};
  ss(SK.HIST(lead.id),[analisisItem,...hist]);
  return{updates,result};
}

/* ── UI components ── */
function Md({t}){
  const h=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong style="color:var(--gold)">$1</strong>')
    .replace(/\n/g,'<br>');
  return <div dangerouslySetInnerHTML={{__html:h}} style={{color:'var(--t1)',fontSize:13,lineHeight:1.8}}/>;
}

function EtapaBadge({etapa}){
  const s=BADGE_STYLE[etapa]||{bg:'#1a1a1a',c:'#5a5550'};
  return <span className="badge" style={{background:s.bg,color:s.c}}>{etapa}</span>;
}
function Spin(){return<div className="spin" style={{width:16,height:16,border:'2px solid var(--gold)',borderTopColor:'transparent',borderRadius:'50%',flexShrink:0}}/>;}

/* ── ChatBubbles ── */
function ChatBubbles({mensajes,leadNombre}){
  const visible=mensajes.slice(-60); // últimos 60 mensajes
  return<div style={{display:'flex',flexDirection:'column',gap:8,padding:'4px 0'}}>
    {visible.map((m,i)=>{
      const isMe=PABLO_NAMES.includes(m.who);
      return<div key={i} style={{display:'flex',flexDirection:'column',alignItems:isMe?'flex-end':'flex-start'}}>
        <span style={{fontSize:10,color:'var(--t3)',marginBottom:2,fontWeight:700,paddingLeft:isMe?0:4,paddingRight:isMe?4:0}}>
          {isMe?'YO':leadNombre||m.who}
        </span>
        <div style={{
          maxWidth:'82%',padding:'8px 12px',lineHeight:1.5,fontSize:12,
          borderRadius:isMe?'12px 12px 2px 12px':'12px 12px 12px 2px',
          background:isMe?'var(--me-bg)':'var(--them-bg)',
          border:`1px solid ${isMe?'var(--me-border)':'var(--them-border)'}`,
          color:isMe?'var(--me-text)':'var(--them-text)',
        }}>
          <div style={{whiteSpace:'pre-wrap'}}>{m.text}</div>
          <div style={{fontSize:10,color:isMe?'#6aaa8a':'var(--t3)',marginTop:4,textAlign:'right'}}>
            {m.date} {m.time}
          </div>
        </div>
      </div>;
    })}
    {mensajes.length>60&&<div style={{textAlign:'center',fontSize:11,color:'var(--t3)',padding:'8px 0'}}>
      Mostrando los últimos 60 de {mensajes.length} mensajes
    </div>}
  </div>;
}

/* ── ZipImport ── */
function ZipImport({onImport,onName,groqKey}){
  const [st,setSt]=useState('idle');const [msg,setMsg]=useState('');
  const handle=async e=>{
    const file=e.target.files?.[0];if(!file)return;e.target.value='';
    setSt('load');setMsg('Abriendo ZIP…');
    try{
      const zip=await JSZip.loadAsync(file);const items=[];
      const tk=Object.keys(zip.files).find(k=>k.endsWith('.txt')&&!zip.files[k].dir);
      if(tk){setMsg('Procesando chat…');
        const content=await zip.files[tk].async('string');
        const msgs=parseWA(content);
        if(msgs.length>0){
          const name=guessName(msgs);if(name&&onName)onName(name);
          const dates=parseChatDates(msgs);
          items.push({id:uid(),ts:new Date().toISOString(),tipo:'chat',
            text:`💬 ${msgs.length} mensajes`,mensajes:msgs,...dates});
        }
      }
      const ak=Object.keys(zip.files).filter(k=>!zip.files[k].dir&&/\.(ogg|opus|mp3|m4a|wav)$/i.test(k));
      if(ak.length>0&&!groqKey){items.push({id:uid(),ts:new Date().toISOString(),tipo:'aviso',text:`🎙 ${ak.length} audio(s). Configurá la key de Groq en ⚙ para transcribirlos.`});}
      else{for(let i=0;i<ak.length;i++){
        const k=ak[i];const fname=k.split('/').pop();
        setMsg(`Transcribiendo ${i+1}/${ak.length}: ${fname}`);
        try{const blob=await zip.files[k].async('blob');const t=await transcribeAudio(blob,fname,groqKey);
          items.push({id:uid(),ts:new Date().toISOString(),tipo:'audio',text:`🎙 ${fname}\n${t}`});
        }catch(err){items.push({id:uid(),ts:new Date().toISOString(),tipo:'error',text:`⚠ Error en ${fname}: ${err.message}`});}
      }}
      if(items.length){onImport(items);setSt('done');setMsg(`✓ ${items.length} elemento(s) importados`);}
      else{setSt('err');setMsg('No se encontró contenido en el ZIP.');}
    }catch(err){setSt('err');setMsg(`Error: ${err.message}`);}
  };
  if(st==='load')return<div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0'}}><Spin/><span style={{color:'var(--gold)',fontSize:12}}>{msg}</span></div>;
  if(st==='done')return<div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
    <span style={{color:'#68d391',fontSize:12}}>{msg}</span>
    <div style={{position:'relative',overflow:'hidden',borderRadius:8}}>
      <span style={{fontSize:12,color:'var(--t3)',padding:'4px 8px',display:'block',textDecoration:'underline'}}>Cambiar</span>
      <input type="file" accept=".zip" onChange={handle} style={{position:'absolute',top:0,left:0,width:'100%',height:'100%',opacity:0,cursor:'pointer'}}/>
    </div>
  </div>;
  return<div>
    {st==='err'&&<p style={{color:'#fc8181',fontSize:12,marginBottom:8}}>{msg}</p>}
    <div style={{position:'relative',overflow:'hidden',borderRadius:10}}>
      <div style={{padding:'12px 14px',background:'var(--surf2)',border:'1px solid var(--bdr)',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',gap:8,fontSize:13,color:'var(--t2)',pointerEvents:'none'}}>
        📦 Seleccionar .zip de WhatsApp
      </div>
      <input type="file" accept=".zip,application/zip" onChange={handle} style={{position:'absolute',top:0,left:0,width:'100%',height:'100%',opacity:0,cursor:'pointer'}}/>
    </div>
  </div>;
}

/* ── PasteImport ── */
function PasteImport({onImport,onName}){
  const [text,setText]=useState('');const [err,setErr]=useState('');const [done,setDone]=useState(false);
  const go=()=>{
    if(!text.trim())return;
    const msgs=parseWA(text.trim());
    if(!msgs.length){setErr('No se reconoció el formato. Exportá el chat sin multimedia y pegá el .txt completo.');return;}
    const name=guessName(msgs);if(name&&onName)onName(name);
    const dates=parseChatDates(msgs);
    onImport([{id:uid(),ts:new Date().toISOString(),tipo:'chat',text:`💬 ${msgs.length} mensajes`,mensajes:msgs,...dates}]);
    setDone(true);setText('');
  };
  if(done)return<div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 14px',background:'#0f2d1e',border:'1px solid #2d6a4f',borderRadius:10,marginBottom:12}}>
    <span style={{color:'#68d391',fontSize:12}}>✓ Chat importado</span>
    <button onClick={()=>setDone(false)} style={{color:'var(--t3)',fontSize:12,textDecoration:'underline'}}>Pegar otro</button>
  </div>;
  return<div style={{marginBottom:16}}>
    <p style={{fontSize:12,color:'var(--t2)',fontWeight:500,marginBottom:6}}>💬 Pegar texto del chat</p>
    <p style={{fontSize:11,color:'var(--t3)',marginBottom:10,lineHeight:1.6}}>WhatsApp → chat → ⋮ → Más → Exportar → Sin multimedia → abrí el .txt → copiá todo → pegá acá.</p>
    <textarea value={text} onChange={e=>setText(e.target.value)} placeholder="Pegá el chat acá…" rows={4} style={{resize:'none',marginBottom:8}}/>
    {err&&<p style={{color:'#fc8181',fontSize:11,marginBottom:8}}>{err}</p>}
    <button onClick={go} disabled={!text.trim()} className="btn-p" style={{opacity:text.trim()?1:.4}}>Importar chat</button>
  </div>;
}

/* ── LeadModal ── */
function LeadModal({leads,settings,onSave,onClose}){
  const [data,setData]=useState({id:uid(),nombre:'',telefono:'',instrumento:'',servicio:'',producto:'',origen:'',tipo:'B2C',etapa:'Frío',prox:'',obs:'',createdAt:new Date().toISOString()});
  const [ph,setPh]=useState([]);
  const [qualifying,setQualifying]=useState(false);
  const [qualResult,setQualResult]=useState('');
  const [qualEtapa,setQualEtapa]=useState('');

  const runQualify=async(items)=>{
    if(!settings?.groqKey)return;
    const src=buildSrc(items);
    if(!src.trim())return;
    setQualifying(true);
    try{
      const [info,result]=await Promise.all([extractInfo(src,settings.groqKey),qualify(src,settings.groqKey)]);
      const found=ETAPAS.find(e=>result.includes(e));
      const proxDate=parseProxDate(result);
      setData(d=>({...d,
        nombre:info.nombre||d.nombre,
        instrumento:info.instrumento||d.instrumento,
        servicio:info.servicio||d.servicio,
        etapa:found||d.etapa,
        prox:proxDate||d.prox,
      }));
      setQualResult(result);
      if(found)setQualEtapa(found);
      // Derivar ultimoContacto del chat
      const chatItem=items.find(h=>h.tipo==='chat');
      if(chatItem?.ultimoContacto)setData(d=>({...d,ultimoContacto:chatItem.ultimoContacto}));
      // Añadir análisis al historial pendiente
      const analisisItem={id:uid(),ts:new Date().toISOString(),tipo:'analisis',text:result};
      setPh(p=>[...p,analisisItem]);
    }catch(e){setQualResult(`Error: ${e.message}`);}
    setQualifying(false);
  };

  const handleImport=items=>{
    setPh(p=>[...items,...p]);
    runQualify(items);
  };

  const save=()=>{
    if(!data.nombre){alert('Ingresá el nombre');return;}
    const tel=data.telefono?.replace(/\D/g,'');
    const nombre=data.nombre.toLowerCase().trim();
    const dupTel=tel&&leads.find(l=>l.telefono?.replace(/\D/g,'')===tel);
    const dupNombre=!dupTel&&leads.find(l=>l.nombre?.toLowerCase().trim()===nombre);
    if(dupTel){if(!confirm(`⚠ Ya existe "${dupTel.nombre}" con ese teléfono (${dupTel.etapa}). ¿Crear igual?`))return;}
    else if(dupNombre){if(!confirm(`⚠ Ya existe "${dupNombre.nombre}" con ese nombre (${dupNombre.etapa}). ¿Crear igual?`))return;}
    if(ph.length)ss(SK.HIST(data.id),ph);
    onSave(data);
  };

  return<Sheet title="Nuevo lead" onClose={onClose}>
    <div style={{background:'var(--surf2)',border:'1px solid var(--bdr)',borderRadius:12,padding:14,marginBottom:18}}>
      <p className="stitle">Importar chat · la IA califica automáticamente</p>
      <DriveImport settings={settings} onImport={handleImport} onName={n=>setData(d=>({...d,nombre:d.nombre||n}))} groqKey={settings?.groqKey}/>
      <PasteImport onImport={handleImport} onName={n=>setData(d=>({...d,nombre:d.nombre||n}))}/>
      <ZipImport onImport={handleImport} onName={n=>setData(d=>({...d,nombre:d.nombre||n}))} groqKey={settings?.groqKey}/>
    </div>
    {qualifying&&<div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',background:'var(--surf2)',border:'1px solid var(--bdr)',borderRadius:12,marginBottom:14}}>
      <Spin/><span style={{color:'var(--gold)',fontSize:12,fontWeight:500}}>Calificando lead…</span>
    </div>}
    {qualEtapa&&!qualifying&&<div style={{padding:'10px 14px',background:'#0f2d1e',border:'1px solid #2d6a4f',borderRadius:12,marginBottom:8,display:'flex',alignItems:'center',gap:8}}>
      <span>✓</span><span style={{color:'#68d391',fontSize:12,fontWeight:600}}>Etapa: {qualEtapa}</span>
    </div>}
    {qualResult&&!qualifying&&<details style={{background:'var(--surf2)',border:'1px solid var(--gold-dim)',borderRadius:12,marginBottom:14,overflow:'hidden'}}>
      <summary style={{padding:'10px 14px',fontSize:12,color:'var(--gold)',cursor:'pointer',fontWeight:500}}>Ver análisis ▾</summary>
      <div style={{padding:'0 14px 14px',borderTop:'1px solid var(--bdr)'}}><div style={{height:10}}/><Md t={qualResult}/></div>
    </details>}
    <LeadForm data={data} onChange={setData}/>
    <div style={{display:'flex',gap:10,marginTop:18,paddingBottom:4}}>
      <button className="btn-s" onClick={onClose}>Cancelar</button>
      <button className="btn-p" onClick={save}>Crear lead</button>
    </div>
  </Sheet>;
}

                  <EtapaBadge etapa={l.etapa}/>
                  {isOver(l.prox)&&<span style={{fontSize:11,color:'#fc8181',fontWeight:600}}>⚠ Vencido</span>}
                  {isToday(l.prox)&&<span style={{fontSize:11,color:'#f6c860',fontWeight:600}}>⏰ Hoy</span>}
                </div>
                <div style={{fontSize:15,fontWeight:600,marginBottom:3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.nombre}</div>
                <div style={{fontSize:12,color:'var(--t2)'}}>{[l.instrumento,l.servicio,l.producto].filter(Boolean).join(' · ')}</div>
                <div style={{fontSize:11,color:'var(--t3)',marginTop:3}}>{[l.origen,l.tipo,l.prox?fmt(l.prox):null].filter(Boolean).join(' · ')}</div>
              </button>
              <div style={{display:'flex',alignItems:'center',gap:4,flexShrink:0}}>
                <button onClick={()=>{if(confirm(`Eliminar ${l.nombre}?`))onDelete(l.id)}} style={{color:'var(--t3)',fontSize:16,padding:4}}>🗑</button>
                <span style={{color:'var(--t3)',fontSize:20}}>›</span>
              </div>
            </div>
          </div>
        ))
    }
  </div>;
}

/* ── LeadDetail ── */
function LeadDetail({lead,settings,onUpdate,onDelete}){
  const [hist,setHist]=useState(()=>sg(SK.HIST(lead.id),[]));
  const [note,setNote]=useState('');
  const [tab,setTab]=useState('hist');
  const [editing,setEditing]=useState(false);
  const [editData,setEditData]=useState({...lead});
  const [qualifying,setQualifying]=useState(false);

  useEffect(()=>{setHist(sg(SK.HIST(lead.id),[]));setEditData({...lead});},[lead.id]);

  const push=items=>{
    const next=[...items,...hist];setHist(next);ss(SK.HIST(lead.id),next);
    // Usar fecha real del chat si está disponible
    const chatItem=items.find(h=>h.tipo==='chat');
    const uc=chatItem?.ultimoContacto||tod();
    onUpdate({...lead,ultimoContacto:uc});
  };
  const addNote=()=>{if(!note.trim())return;push([{id:uid(),ts:new Date().toISOString(),tipo:'nota',text:note.trim()}]);setNote('');};

  const doQualify=async()=>{
    if(!settings?.groqKey){alert('Configurá la key de Groq en ⚙ primero.');return;}
    const src=buildSrc(hist);
    if(!src.trim()){alert('Importá el chat primero (tab Importar).');return;}
    setQualifying(true);
    try{
      const [info,result]=await Promise.all([extractInfo(src,settings.groqKey),qualify(src,settings.groqKey)]);
      const updates={ultimoContacto:tod()};
      if(info.nombre)updates.nombre=info.nombre;
      if(info.instrumento)updates.instrumento=info.instrumento;
      if(info.servicio)updates.servicio=info.servicio;
      const found=ETAPAS.find(e=>result.includes(e));if(found)updates.etapa=found;
      const proxDate=parseProxDate(result);if(proxDate)updates.prox=proxDate;
      onUpdate({...lead,...updates});
      const analisisItem={id:uid(),ts:new Date().toISOString(),tipo:'analisis',text:result};
      push([analisisItem]);
      if(proxDate){
        const d=new Date(proxDate+'T09:00:00');const now=new Date();const delay=d-now;
        if(delay>0)setTimeout(()=>notify('Scaglia CRM — Seguimiento',`${updates.nombre||lead.nombre}: ${updates.etapa||lead.etapa}`),delay);
      }
    }catch(err){alert(`Error: ${err.message}`);}
    setQualifying(false);
  };

  const IC={nota:'📝',chat:'',audio:'🎙',error:'⚠️',aviso:'ℹ️',analisis:'🤖'};

  return<div style={{paddingTop:16,display:'flex',flexDirection:'column',gap:14}}>
    {/* Card */}
    <div className="card">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:20,fontWeight:700,marginBottom:4,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{lead.nombre||'Sin nombre'}</div>
          {lead.telefono&&<a href={`https://wa.me/${lead.telefono.replace(/\D/g,'')}`} target="_blank" style={{color:'#68d391',fontSize:12}}>📞 {lead.telefono}</a>}
        </div>
        <div style={{display:'flex',gap:6,flexShrink:0}}>
          <button onClick={()=>setEditing(true)} style={{background:'var(--surf2)',border:'1px solid var(--bdr)',borderRadius:8,padding:'6px 10px',fontSize:14,color:'var(--t2)'}}>✏️</button>
          <button onClick={()=>{if(confirm(`Eliminar ${lead.nombre}?`))onDelete(lead.id)}} style={{background:'var(--surf2)',border:'1px solid var(--bdr)',borderRadius:8,padding:'6px 10px',fontSize:14,color:'var(--t3)'}}>🗑</button>
        </div>
      </div>
      {(lead.instrumento||lead.servicio)&&<div style={{display:'flex',gap:8,marginTop:12,flexWrap:'wrap'}}>
        {lead.instrumento&&<span style={{fontSize:14,fontWeight:700,padding:'5px 14px',borderRadius:8,background:'#1a2744',color:'#90cdf4'}}>🎷 {lead.instrumento}</span>}
        {lead.servicio&&<span style={{fontSize:14,fontWeight:700,padding:'5px 14px',borderRadius:8,background:lead.servicio==='Refacing'?'#2d1b5c':'#3a2500',color:lead.servicio==='Refacing'?'#c4b5fd':'#f6c860'}}>{lead.servicio==='Refacing'?'🔧':'✨'} {lead.servicio}</span>}
      </div>}
      <div style={{display:'flex',flexWrap:'wrap',gap:6,marginTop:10}}>
        <EtapaBadge etapa={lead.etapa}/>
        {[lead.origen,lead.tipo].filter(Boolean).map(t=><span key={t} className="badge" style={{background:'var(--surf2)',color:'var(--t2)',border:'1px solid var(--bdr)'}}>{t}</span>)}
      </div>
      {lead.producto&&<div style={{fontSize:12,color:'var(--gold)',marginTop:10,fontWeight:600}}>📦 {lead.producto}</div>}
      <div style={{display:'flex',gap:16,marginTop:10,flexWrap:'wrap'}}>
        {lead.prox&&<div style={{fontSize:12,color:isOver(lead.prox)?'#fc8181':isToday(lead.prox)?'#f6c860':'var(--t3)'}}>
          📅 Próximo: {fmt(lead.prox)}{isOver(lead.prox)&&<strong> · Vencido</strong>}{isToday(lead.prox)&&<strong> · Hoy</strong>}
        </div>}
        {lead.ultimoContacto&&<div style={{fontSize:11,color:'var(--t3)'}}>Último: {fmt(lead.ultimoContacto)}</div>}
      </div>
      {lead.obs&&<div style={{marginTop:10,fontSize:12,color:'var(--t2)',background:'var(--surf2)',borderRadius:8,padding:'8px 12px',lineHeight:1.7}}>{lead.obs}</div>}
    </div>

    {/* Quick edits */}
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
      <div><label className="lbl">Etapa</label>
        <select value={lead.etapa} onChange={e=>onUpdate({...lead,etapa:e.target.value})} style={{fontSize:12,padding:'8px 10px'}}>
          {ETAPAS.map(e=><option key={e} value={e}>{e}</option>)}
        </select>
      </div>
      <div><label className="lbl">Próximo contacto</label>
        <input type="date" value={lead.prox||''} onChange={e=>onUpdate({...lead,prox:e.target.value})} style={{fontSize:12,padding:'8px 10px'}}/>
      </div>
    </div>

    {/* Tabs — sin Calificar */}
    <div className="tabs">
      {[{id:'hist',l:'Historial'},{id:'import',l:'Importar'}].map(({id,l})=>(
        <button key={id} onClick={()=>setTab(id)} className={`tab${tab===id?' on':''}`}>{l}</button>
      ))}
      <button onClick={doQualify} disabled={qualifying} style={{
        flex:1,padding:'8px 4px',borderRadius:8,fontSize:12,fontWeight:600,
        background:qualifying?'var(--surf2)':'var(--gold-dim)',
        color:qualifying?'var(--t3)':'#f6c860',border:'none',
        display:'flex',alignItems:'center',justifyContent:'center',gap:6
      }}>
        {qualifying?<><Spin/>...</>:'🤖 Calificar'}
      </button>
    </div>

    {tab==='hist'&&<div style={{display:'flex',flexDirection:'column',gap:10}}>
      <div style={{display:'flex',gap:8}}>
        <input value={note} onChange={e=>setNote(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addNote()} placeholder="Nota rápida (Enter = guardar)" style={{flex:1}}/>
        <button onClick={addNote} style={{background:'var(--gold)',color:'#0f0f0f',borderRadius:10,padding:'10px 16px',fontSize:20,fontWeight:700,flexShrink:0}}>+</button>
      </div>
      {hist.length===0
        ?<div style={{textAlign:'center',padding:'40px 0',color:'var(--t3)',fontSize:13}}>Sin historial</div>
        :hist.map(h=>(
          <div key={h.id} style={{background:'var(--surf)',border:`1px solid ${h.tipo==='analisis'?'var(--gold-dim)':'var(--bdr)'}`,borderRadius:12}}>
            <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 14px 8px',borderBottom:'1px solid var(--bdr)'}}>
              <span style={{fontSize:14}}>{IC[h.tipo]||'📌'}</span>
              <span style={{fontSize:11,color:'var(--t3)'}}>{new Date(h.ts).toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</span>
              {h.tipo==='chat'&&h.mensajes&&<span style={{fontSize:11,color:'var(--t3)',marginLeft:'auto'}}>{h.mensajes.length} mensajes</span>}
            </div>
            <div style={{padding:'10px 14px'}}>
              {h.tipo==='chat'&&h.mensajes
                ?<ChatBubbles mensajes={h.mensajes} leadNombre={lead.nombre}/>
                :h.tipo==='analisis'
                  ?<Md t={h.text}/>
                  :<div style={{fontSize:12,color:'var(--t2)',whiteSpace:'pre-wrap',lineHeight:1.7}}>{h.text}</div>
              }
            </div>
          </div>
        ))
      }
    </div>}

    {tab==='import'&&<div style={{display:'flex',flexDirection:'column',gap:12}}>
      <div className="card">
        <DriveImport settings={settings} onImport={items=>{push(items);setTab('hist');}} onName={n=>{if(!lead.nombre)onUpdate({...lead,nombre:n});}} groqKey={settings?.groqKey}/>
        <PasteImport onImport={items=>{push(items);setTab('hist');}} onName={n=>{if(!lead.nombre)onUpdate({...lead,nombre:n});}}/>
      </div>
      <details className="card" style={{padding:0,overflow:'hidden'}}>
        <summary style={{padding:'14px 16px',fontSize:12,color:'var(--t2)',cursor:'pointer'}}>📦 Subir .zip (funciona en PC y navegador del celular)</summary>
        <div style={{padding:'0 16px 16px',borderTop:'1px solid var(--bdr)'}}><div style={{height:12}}/>
          <ZipImport onImport={items=>{push(items);setTab('hist');}} onName={n=>{if(!lead.nombre)onUpdate({...lead,nombre:n});}} groqKey={settings?.groqKey}/>
        </div>
      </details>
    </div>}

    {editing&&<Sheet title="Editar lead" onClose={()=>setEditing(false)}>
      <LeadForm data={editData} onChange={setEditData}/>
      <div style={{display:'flex',gap:10,marginTop:18,paddingBottom:4}}>
        <button className="btn-s" onClick={()=>setEditing(false)}>Cancelar</button>
        <button className="btn-p" onClick={()=>{onUpdate({...lead,...editData});setEditing(false);}}>Guardar</button>
      </div>
    </Sheet>}
  </div>;
}

/* ── App ── */
function App(){
  const [view,setView]=useState('dashboard');
  const [leads,setLeads]=useState(()=>sg(SK.LEADS,[]));
  const [selId,setSelId]=useState(null);
  const [settings,setSettings]=useState(()=>{const s=sg(SK.SETTINGS,null);if(!s){const d={groqKey:GKEY,googleClientId:'64071020848-pbmqlppr8c2lcg7hit8j0gvgu062fg31.apps.googleusercontent.com'};ss(SK.SETTINGS,d);return d;}return s;});
  const [modal,setModal]=useState(null);
  const [filters,setFilters]=useState({q:'',etapa:'',servicio:'',origen:''});
  const [refreshing,setRefreshing]=useState(false);

  useEffect(()=>{
    requestNotifs();
    const urgentes=leads.filter(l=>l.etapa!=='Ganado'&&l.etapa!=='Perdido'&&(isOver(l.prox)||isToday(l.prox)));
    if(urgentes.length>0)setTimeout(()=>notify('Scaglia CRM',`${urgentes.length} seguimiento(s) pendiente(s) hoy`),2000);
  },[]);

  const upsert=lead=>setLeads(prev=>{const idx=prev.findIndex(l=>l.id===lead.id);const next=idx>=0?prev.map((l,i)=>i===idx?lead:l):[...prev,lead];ss(SK.LEADS,next);return next;});
  const remove=id=>setLeads(prev=>{const next=prev.filter(l=>l.id!==id);ss(SK.LEADS,next);return next;});

  const [refreshProgress,setRefreshProgress]=useState('');
  const refreshAll=async()=>{
    if(!settings?.groqKey){alert('Configurá la key de Groq en ⚙ primero.');return;}
    setRefreshing(true);setRefreshProgress('Buscando leads con chat…');
    const activos=leads.filter(l=>l.etapa!=='Ganado'&&l.etapa!=='Perdido');
    // Aceptar cualquier lead con items de chat o audio, sin importar el formato
    const conChat=activos.filter(l=>{
      const h=sg(SK.HIST(l.id),[]);
      return h.some(i=>i.tipo==='chat'||i.tipo==='audio');
    });
    if(conChat.length===0){
      setRefreshing(false);setRefreshProgress('');
      alert('Ningún lead tiene chat importado todavía. Importá los chats primero desde la ficha de cada lead.');
      return;
    }
    let ok=0;
    for(let i=0;i<conChat.length;i++){
      const lead=conChat[i];
      setRefreshProgress(`${i+1} de ${conChat.length}: ${lead.nombre||'lead'}`);
      try{
        const res=await runQualifyForLead(lead,settings.groqKey);
        if(res){upsert({...lead,...res.updates});ok++;}
      }catch(e){console.error(lead.nombre,e);}
    }
    setRefreshing(false);setRefreshProgress('');
    alert(`✓ ${ok} de ${conChat.length} lead(s) actualizados correctamente.`);
  };

  const urgentes=leads.filter(l=>l.etapa!=='Ganado'&&l.etapa!=='Perdido'&&(isOver(l.prox)||isToday(l.prox)));
  const selLead=leads.find(l=>l.id===selId);

  return<div style={{minHeight:'100vh',background:'var(--bg)',fontSize:14}}>
    <header style={{position:'sticky',top:0,zIndex:20,background:'var(--bg)',borderBottom:'1px solid var(--bdr)',padding:'12px 16px'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',maxWidth:640,margin:'0 auto'}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          {(view==='leads'||view==='detail')&&<button onClick={()=>setView(view==='detail'?'leads':'dashboard')} style={{color:'var(--t2)',fontSize:24,lineHeight:1,padding:'0 4px 0 0'}}>‹</button>}
          <div>
            <div style={{fontFamily:"'Playfair Display','Georgia',serif",fontSize:17,fontWeight:700,color:'var(--gold)',letterSpacing:'.06em',lineHeight:1}}>SCAGLIA</div>
            <div style={{fontSize:9,color:'var(--t3)',letterSpacing:'.14em',textTransform:'uppercase',marginTop:2,fontWeight:600}}>CRM · Boquillas</div>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          {urgentes.length>0&&<button onClick={()=>setView('dashboard')} style={{position:'relative'}}>
            <span style={{fontSize:18}}>🔔</span>
            <span style={{position:'absolute',top:-4,right:-4,background:'#fc8181',color:'#0f0f0f',fontSize:9,fontWeight:700,borderRadius:'50%',width:15,height:15,display:'flex',alignItems:'center',justifyContent:'center'}}>{urgentes.length}</span>
          </button>}
          <button onClick={()=>setModal('settings')} style={{color:'var(--t3)',fontSize:18}}>⚙️</button>
        </div>
      </div>
    </header>
    <nav style={{borderBottom:'1px solid var(--bdr)',padding:'0 16px',background:'var(--bg)'}}>
      <div style={{display:'flex',maxWidth:640,margin:'0 auto'}}>
        {[{id:'dashboard',l:'Inicio'},{id:'leads',l:`Leads (${leads.length})`}].map(({id,l})=>(
          <button key={id} onClick={()=>setView(id)} style={{padding:'11px 16px',fontSize:13,fontWeight:500,background:'none',borderBottom:`2px solid ${(view===id||(view==='detail'&&id==='leads'))?'var(--gold)':'transparent'}`,color:(view===id||(view==='detail'&&id==='leads'))?'var(--gold)':'var(--t3)',transition:'all .15s'}}>{l}</button>
        ))}
      </div>
    </nav>
    <main style={{maxWidth:640,margin:'0 auto',padding:'0 16px 100px'}}>
      {view==='dashboard'&&<Dashboard leads={leads} urgentes={urgentes} onSelect={id=>{setSelId(id);setView('detail');}} onUpdate={upsert} onRefreshAll={refreshAll} refreshing={refreshing} refreshProgress={refreshProgress}/>}
      {view==='leads'&&<LeadsTable leads={leads} filters={filters} setFilters={setFilters} onSelect={id=>{setSelId(id);setView('detail');}} onDelete={remove}/>}
      {view==='detail'&&selLead&&<LeadDetail lead={selLead} settings={settings} onUpdate={upsert} onDelete={id=>{remove(id);setView('leads');}}/>}
    </main>
    {view!=='detail'&&<button onClick={()=>setModal('add')} style={{position:'fixed',bottom:24,right:20,background:'var(--gold)',color:'#0f0f0f',borderRadius:'50%',width:56,height:56,fontSize:26,fontWeight:300,boxShadow:`0 4px 20px var(--gold-glow)`,zIndex:10,display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>}
    {modal==='add'&&<LeadModal leads={leads} settings={settings} onSave={l=>{upsert(l);setModal(null);}} onClose={()=>setModal(null)}/>}
    {modal==='settings'&&<SettingsModal settings={settings} onSave={s=>{ss(SK.SETTINGS,s);setSettings(s);setModal(null);}} onClose={()=>setModal(null)}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
